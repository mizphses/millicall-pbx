services:
  millicall:
    build: .
    container_name: millicall-pbx
    network_mode: host
    restart: unless-stopped
    volumes:
      - millicall-data:/app/data
      - ./asterisk_templates:/app/asterisk_templates:ro
      - /var/lib/misc/dnsmasq.leases:/var/lib/misc/dnsmasq.leases:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/millicall.db
      - ASTERISK_CONFIG_DIR=/etc/asterisk
      - ASTERISK_TEMPLATES_DIR=/app/asterisk_templates
      - PBX_BIND_ADDRESS=0.0.0.0
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
    env_file:
      - .env

  frontend:
    build: ./frontend
    container_name: millicall-frontend
    network_mode: host
    restart: unless-stopped
    depends_on:
      - millicall

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: millicall-tunnel
    network_mode: host
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend

volumes:
  millicall-data:
