{% extends "base.html" %}
{% block title %}{{ "内線番号を編集" if extension else "内線番号を追加" }} - Millicall PBX{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ "内線番号を編集" if extension else "内線番号を追加" }}</h1>
</div>

<div class="card">
    <form method="post" action="{{ '/extensions/' ~ extension.id if extension else '/extensions' }}">
        <div class="form-section">
            <div class="form-section-title">基本情報</div>
            <div class="form-row">
                <div class="field">
                    <label for="number">内線番号</label>
                    <input type="text" id="number" name="number" placeholder="1001"
                           value="{{ extension.number if extension else '' }}"
                           required pattern="\d+" maxlength="20">
                </div>
                <div class="field">
                    <label for="display_name">表示名</label>
                    <input type="text" id="display_name" name="display_name" placeholder="受付"
                           value="{{ extension.display_name if extension else '' }}"
                           required maxlength="100">
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title">接続設定</div>
            <div class="field">
                <label for="peer_id">SIPピア</label>
                <select id="peer_id" name="peer_id">
                    <option value="">-- 未割当 --</option>
                    {% for peer in peers %}
                    <option value="{{ peer.id }}"
                            {{ "selected" if extension and extension.peer_id == peer.id }}>
                        {{ peer.username }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <fieldset>
                <label class="checkbox-label">
                    <input type="checkbox" name="enabled" value="true"
                           {{ "checked" if not extension or extension.enabled }}>
                    この内線番号を有効にする
                </label>
            </fieldset>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-lg">{{ "更新" if extension else "作成" }}</button>
            <a href="/extensions" class="btn btn-secondary btn-lg">キャンセル</a>
        </div>
    </form>
</div>
{% endblock %}
