<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Millicall PBX{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0}

        :root {
            --ink: #1a1d23;
            --ink-muted: #5c6070;
            --ink-faint: #9098a8;
            --surface: #f6f5f2;
            --surface-raised: #ffffff;
            --surface-sunken: #edecea;
            --border: #d8d6d0;
            --border-light: #e8e6e2;
            --accent: #3d5a80;
            --accent-hover: #2c4a6e;
            --accent-subtle: #e8eef5;
            --success: #3a7d5c;
            --success-bg: #e6f3ec;
            --danger: #c14444;
            --danger-bg: #fbeaea;
            --warning: #b8860b;
            --warning-bg: #fef8e8;
            --radius: 6px;
            --radius-lg: 10px;
            --shadow-sm: 0 1px 2px rgba(26,29,35,0.06);
            --shadow: 0 1px 3px rgba(26,29,35,0.08), 0 1px 2px rgba(26,29,35,0.06);
            --shadow-md: 0 4px 12px rgba(26,29,35,0.08), 0 1px 3px rgba(26,29,35,0.06);
            --transition: 150ms ease;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.7;
            color: var(--ink);
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navigation ── */
        .site-nav {
            background: var(--surface-raised);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .site-nav .brand {
            font-weight: 700;
            font-size: 15px;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.02em;
            white-space: nowrap;
            margin-right: 1rem;
        }

        .nav-group {
            display: flex;
            align-items: center;
            gap: 0;
            height: 100%;
        }

        .nav-group::before {
            content: '';
            width: 1px;
            height: 20px;
            background: var(--border);
            margin-right: 0.25rem;
        }

        .nav-group:first-of-type::before {
            display: none;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0 0.75rem;
            height: 100%;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-muted);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: color var(--transition), border-color var(--transition);
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--ink);
        }

        .nav-link.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .nav-icon {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .nav-link.active .nav-icon,
        .nav-link:hover .nav-icon {
            opacity: 1;
        }

        /* ── Main ── */
        .page {
            flex: 1;
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* ── Typography ── */
        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.4;
        }

        h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .page-header {
            margin-bottom: 1.5rem;
        }

        .page-header p {
            color: var(--ink-muted);
            font-size: 13px;
            margin-top: 0.25rem;
        }

        .page-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-header-row .page-header {
            margin-bottom: 0;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.5rem 1rem;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--surface-raised);
            color: var(--ink);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--surface-sunken);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink-muted);
        }

        .btn-ghost:hover {
            background: var(--surface-sunken);
            color: var(--ink);
        }

        .btn-danger {
            background: transparent;
            color: var(--danger);
            border-color: var(--border-light);
        }

        .btn-danger:hover {
            background: var(--danger-bg);
            border-color: var(--danger);
        }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 12px;
        }

        .btn-lg {
            padding: 0.6rem 1.5rem;
            font-size: 14px;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface-raised);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        /* ── Stats ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .stat {
            background: var(--surface-raised);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--ink);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--ink-muted);
            margin-top: 0.25rem;
        }

        /* ── Tables ── */
        .table-wrap {
            background: var(--surface-raised);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: var(--surface-sunken);
        }

        th {
            padding: 0.6rem 1rem;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink-muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.7rem 1rem;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: var(--accent-subtle);
        }

        .cell-actions {
            white-space: nowrap;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.35rem;
        }

        .cell-actions form {
            display: inline;
        }

        /* ── Badges ── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.5rem;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .badge-success {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-danger {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .badge-info {
            background: var(--accent-subtle);
            color: var(--accent);
        }

        .badge-muted {
            background: var(--surface-sunken);
            color: var(--ink-muted);
        }

        /* ── Forms ── */
        .form-section {
            margin-bottom: 2rem;
        }

        .form-section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--ink-muted);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink);
            margin-bottom: 0.35rem;
        }

        label .hint {
            font-weight: 400;
            color: var(--ink-faint);
            font-size: 12px;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.5;
            color: var(--ink);
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(61,90,128,0.12);
        }

        input::placeholder, textarea::placeholder {
            color: var(--ink-faint);
        }

        .field {
            margin-bottom: 1rem;
        }

        .field-help {
            font-size: 12px;
            color: var(--ink-faint);
            margin-top: 0.25rem;
        }

        fieldset {
            border: none;
            padding: 0;
        }

        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        /* ── Utilities ── */
        code {
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            font-size: 12px;
            background: var(--surface-sunken);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            color: var(--ink);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-muted);
        }

        .empty-state p {
            margin-bottom: 1rem;
        }

        .section-gap {
            margin-top: 2rem;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border-light);
            margin: 1.5rem 0;
        }

        details {
            margin-top: 1rem;
        }

        details summary {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-muted);
            cursor: pointer;
            padding: 0.5rem 0;
        }

        details summary:hover {
            color: var(--ink);
        }

        details[open] summary {
            margin-bottom: 0.75rem;
        }

        pre {
            background: var(--surface-sunken);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1rem;
            font-size: 13px;
            overflow-x: auto;
        }

        /* ── Footer ── */
        .site-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 11px;
            color: var(--ink-faint);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .site-nav {
                padding: 0 1rem;
                gap: 0;
                overflow-x: auto;
            }
            .page {
                padding: 1.5rem 1rem;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .page-header-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="brand">Millicall</a>
        <div class="nav-group">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                ホーム
            </a>
        </div>
        <div class="nav-group">
            <a href="/extensions" class="nav-link {% if '/extensions' in request.url.path %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                内線番号
            </a>
            <a href="/peers" class="nav-link {% if '/peers' in request.url.path %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"/></svg>
                SIPピア
            </a>
        </div>
        <div class="nav-group">
            <a href="/agents" class="nav-link {% if '/agents' in request.url.path %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                AIエージェント
            </a>
        </div>
        <div class="nav-group">
            <a href="/settings" class="nav-link {% if '/settings' in request.url.path %}active{% endif %}">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
                設定
            </a>
        </div>
    </nav>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        Millicall PBX v0.1.0
    </footer>
</body>
</html>
