<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Millicall PBX{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0}

        :root {
            --ink: #1b1b1f;
            --ink-sub: #4a4a52;
            --ink-faint: #8e8e96;
            --bg: #f0eeeb;
            --bg-card: #fff;
            --bg-muted: #e6e4e0;
            --border: #d4d2cd;
            --border-light: #e6e4e0;
            --accent: #c45d2c;
            --accent-hover: #a84e24;
            --accent-pale: #fdf3ee;
            --nav-bg: #262630;
            --nav-ink: #b0afc0;
            --nav-active: #fff;
            --green: #2a7e4f;
            --green-bg: #e3f4eb;
            --red: #b83232;
            --red-bg: #fce8e8;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 14px;
            line-height: 1.7;
            color: var(--ink);
            background: var(--bg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Nav ── */
        .topbar {
            background: var(--nav-bg);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            height: 48px;
            gap: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            text-decoration: none;
            padding-right: 1.5rem;
            margin-right: 0.25rem;
            border-right: 1px solid rgba(255,255,255,0.1);
            letter-spacing: -0.02em;
        }

        .topbar-links {
            display: flex;
            gap: 0;
            height: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .topbar-links::-webkit-scrollbar { display: none; }

        .topbar-links a {
            display: flex;
            align-items: center;
            padding: 0 0.85rem;
            height: 100%;
            font-size: 13px;
            font-weight: 500;
            color: var(--nav-ink);
            text-decoration: none;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: color 0.15s;
        }

        .topbar-links a:hover {
            color: #ddd;
        }

        .topbar-links a.active {
            color: var(--nav-active);
            border-bottom-color: var(--accent);
        }

        /* hamburger toggle for mobile */
        .topbar-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--nav-ink);
            cursor: pointer;
            padding: 8px;
            margin-left: auto;
        }
        .topbar-toggle svg { display: block; }

        /* ── Page ── */
        .page {
            max-width: 920px;
            margin: 0 auto;
            padding: 1.75rem 1.5rem 3rem;
        }

        h1 { font-size: 21px; font-weight: 700; margin-bottom: 0.2rem; letter-spacing: -0.01em; }
        h2 { font-size: 15px; font-weight: 600; margin-bottom: 0.2rem; }

        .page-sub { color: var(--ink-sub); font-size: 13px; margin-bottom: 1.25rem; }

        .page-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .page-head .page-sub { margin-bottom: 0; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            padding: 7px 14px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            border-radius: 5px;
            border: 1px solid transparent;
            cursor: pointer;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.15s, border-color 0.15s;
            min-height: 34px;
        }
        .btn:hover { text-decoration: none; }

        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }

        .btn-sub { background: #fff; color: var(--ink); border-color: var(--border); }
        .btn-sub:hover { background: var(--bg-muted); }

        .btn-text { background: none; color: var(--ink-sub); padding: 7px 10px; }
        .btn-text:hover { background: var(--bg-muted); color: var(--ink); }

        .btn-del { background: none; color: var(--red); border-color: var(--border); }
        .btn-del:hover { background: var(--red-bg); border-color: var(--red); }

        .btn-sm { padding: 4px 10px; font-size: 12px; min-height: 28px; }
        .btn-lg { padding: 9px 18px; font-size: 14px; min-height: 38px; }

        /* ── Table ── */
        .tbl-wrap {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            background: #faf9f7;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--accent-pale); }

        .td-actions {
            text-align: right;
            white-space: nowrap;
        }
        .td-actions form { display: inline; }

        /* ── Badges ── */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .tag-ok { background: var(--green-bg); color: var(--green); }
        .tag-ng { background: var(--red-bg); color: var(--red); }
        .tag-info { background: #e5ecf5; color: #365a8a; }
        .tag-muted { background: var(--bg-muted); color: var(--ink-sub); }

        /* ── Card ── */
        .card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.25rem;
        }

        /* ── Stats ── */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }
        .stats-item {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px 16px;
            border-left: 3px solid var(--accent);
        }
        .stats-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 26px;
            font-weight: 500;
            line-height: 1;
            color: var(--ink);
        }
        .stats-label { font-size: 12px; color: var(--ink-sub); margin-top: 4px; }

        /* ── Forms ── */
        .form-group { margin-bottom: 1rem; }

        .form-group > label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .form-hint { font-size: 12px; color: var(--ink-faint); margin-top: 3px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .form-section {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-sub);
            margin: 1.75rem 0 0.75rem;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--border-light);
        }
        .form-section:first-child { margin-top: 0; }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 8px 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--ink);
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 5px;
            outline: none;
            min-height: 38px;
            transition: border-color 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(196,93,44,0.12);
        }
        input::placeholder, textarea::placeholder { color: #bbb; }

        .check-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 0;
        }
        .check-label input[type="checkbox"] {
            width: 16px; height: 16px;
            accent-color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 8px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-light);
        }

        /* ── Misc ── */
        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            background: var(--bg-muted);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--ink-sub);
        }
        .empty p { margin-bottom: 0.75rem; }

        .mt { margin-top: 1.5rem; }
        hr { border: none; border-top: 1px solid var(--border-light); margin: 1.5rem 0; }

        details summary {
            font-size: 13px;
            color: var(--ink-sub);
            cursor: pointer;
            padding: 6px 0;
        }
        details summary:hover { color: var(--ink); }
        details[open] summary { margin-bottom: 8px; }

        pre {
            background: var(--bg-muted);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow-x: auto;
        }

        /* ── Sortable tables ── */
        th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-right: 20px;
        }
        th.sortable::after {
            content: '⇅';
            position: absolute;
            right: 4px;
            opacity: 0.3;
            font-size: 10px;
        }
        th.sortable.asc::after { content: '▲'; opacity: 0.7; }
        th.sortable.desc::after { content: '▼'; opacity: 0.7; }

        .footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 11px;
            color: var(--ink-faint);
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .topbar {
                flex-wrap: wrap;
                height: auto;
                padding: 0;
            }

            .topbar-brand {
                padding: 12px 1rem;
                border-right: none;
                margin-right: auto;
            }

            .topbar-toggle {
                display: block;
                margin-right: 0.75rem;
            }

            .topbar-links {
                display: none;
                width: 100%;
                flex-direction: column;
                border-top: 1px solid rgba(255,255,255,0.08);
            }

            .topbar-links.open {
                display: flex;
            }

            .topbar-links a {
                padding: 12px 1.25rem;
                border-bottom: none;
                border-left: 3px solid transparent;
                height: auto;
            }

            .topbar-links a.active {
                border-left-color: var(--accent);
                border-bottom: none;
                background: rgba(255,255,255,0.04);
            }

            .topbar-links a:hover {
                background: rgba(255,255,255,0.06);
            }

            .page { padding: 1.25rem 1rem 2rem; }

            .page-head {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-row { grid-template-columns: 1fr; }

            .stats { grid-template-columns: repeat(2, 1fr); }

            .btn-sm { padding: 6px 12px; font-size: 13px; min-height: 32px; }

            td, th { padding: 8px 10px; }

            .form-actions {
                flex-direction: column;
            }
            .form-actions .btn { width: 100%; }
        }

        @media (max-width: 360px) {
            .stats { grid-template-columns: 1fr; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="topbar">
        <a href="/" class="topbar-brand">Millicall</a>
        <button class="topbar-toggle" onclick="document.querySelector('.topbar-links').classList.toggle('open')" aria-label="メニュー">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><rect y="3" width="20" height="2" rx="1"/><rect y="9" width="20" height="2" rx="1"/><rect y="15" width="20" height="2" rx="1"/></svg>
        </button>
        <div class="topbar-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">ホーム</a>
            <a href="/extensions" class="{% if '/extensions' in request.url.path %}active{% endif %}">内線アカウント</a>
            <a href="/peers" class="{% if '/peers' in request.url.path %}active{% endif %}">SIP電話機登録</a>
            <a href="/trunks" class="{% if '/trunks' in request.url.path %}active{% endif %}">外線トランク</a>
            <a href="/devices" class="{% if '/devices' in request.url.path %}active{% endif %}">デバイス管理</a>
            <a href="/cdr" class="{% if '/cdr' in request.url.path %}active{% endif %}">発着信記録</a>
            <a href="/call-history" class="{% if '/call-history' in request.url.path %}active{% endif %}">AI通話履歴</a>
            <a href="/settings" class="{% if '/settings' in request.url.path %}active{% endif %}">詳細設定</a>
        </div>
    </nav>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">Millicall PBX v0.1.0</footer>
    <script>
    document.addEventListener('click', function(e) {
        var th = e.target.closest('th.sortable');
        if (!th) return;
        var table = th.closest('table');
        var tbody = table.querySelector('tbody');
        if (!tbody) return;
        var idx = Array.from(th.parentNode.children).indexOf(th);
        var rows = Array.from(tbody.querySelectorAll('tr'));
        var asc = !th.classList.contains('asc');
        th.parentNode.querySelectorAll('th').forEach(function(h){h.classList.remove('asc','desc');});
        th.classList.add(asc ? 'asc' : 'desc');
        rows.sort(function(a, b) {
            var at = (a.children[idx] || {}).textContent.trim();
            var bt = (b.children[idx] || {}).textContent.trim();
            var an = parseFloat(at), bn = parseFloat(bt);
            if (!isNaN(an) && !isNaN(bn)) return asc ? an - bn : bn - an;
            return asc ? at.localeCompare(bt, 'ja') : bt.localeCompare(at, 'ja');
        });
        rows.forEach(function(r){ tbody.appendChild(r); });
    });
    </script>
</body>
</html>
