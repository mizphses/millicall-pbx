{% extends "base.html" %}
{% block title %}詳細設定 - Millicall PBX{% endblock %}
{% block content %}
<h1>詳細設定</h1>
<p class="page-sub">外線接続やAPIキーの設定</p>

<form method="post" action="/settings">

    <div class="card">
        <div class="form-section" style="margin-top:0;">外線接続（SIPトランク）</div>
        <p style="color:var(--ink-sub);font-size:13px;">外線トランクの設定は <a href="/trunks">外線トランク</a> ページで管理できます。</p>
    </div>

    <div class="card mt">
        <div class="form-section" style="margin-top:0;">APIキー</div>

        <div class="form-row">
            <div class="form-group">
                <label for="coefont_access_key">CoeFont アクセスキー</label>
                <input type="password" id="coefont_access_key" name="coefont_access_key"
                       value="{{ s.get('coefont_access_key', '') }}" placeholder="未設定"
                       autocomplete="off">
            </div>
            <div class="form-group">
                <label for="coefont_access_secret">CoeFont シークレット</label>
                <input type="password" id="coefont_access_secret" name="coefont_access_secret"
                       value="{{ s.get('coefont_access_secret', '') }}" placeholder="未設定"
                       autocomplete="off">
            </div>
        </div>

        <div class="form-group">
            <label for="google_api_key">Google APIキー</label>
            <input type="password" id="google_api_key" name="google_api_key"
                   value="{{ s.get('google_api_key', '') }}" placeholder="未設定"
                   autocomplete="off">
            <div class="form-hint">Gemini LLM / Chirp3 TTS に使用</div>
        </div>

        <div class="form-group">
            <label for="openai_api_key">OpenAI APIキー</label>
            <input type="password" id="openai_api_key" name="openai_api_key"
                   value="{{ s.get('openai_api_key', '') }}" placeholder="未設定"
                   autocomplete="off">
            <div class="form-hint">Whisper STT / GPTモデル に使用</div>
        </div>

        <div class="form-group">
            <label for="anthropic_api_key">Anthropic APIキー</label>
            <input type="password" id="anthropic_api_key" name="anthropic_api_key"
                   value="{{ s.get('anthropic_api_key', '') }}" placeholder="未設定"
                   autocomplete="off">
            <div class="form-hint">Claude モデル に使用</div>
        </div>
    </div>

    <div style="margin-top:1rem;">
        <button type="submit" class="btn btn-primary btn-lg">設定を保存</button>
    </div>
</form>

{% endblock %}
